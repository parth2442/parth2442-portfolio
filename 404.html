<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Parth Raut</title>
    <meta name="description" content="The page you're looking for doesn't exist. Return to Parth Raut's portfolio.">
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="canonical" href="https://parth2442.github.io/404.html">
    <!-- Update the canonical URL above to match your deployed domain -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            background: var(--bg-primary);
        }
        .error-page .container {
            max-width: 520px;
        }
        .error-code {
            font-size: 7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 12px;
            letter-spacing: -3px;
        }
        .error-page h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 14px;
        }
        .error-page p {
            color: var(--text-secondary);
            font-size: 1.05rem;
            margin-bottom: 36px;
            line-height: 1.7;
        }
        .error-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        body { background: var(--bg-primary); }
    </style>
</head>
<body>
    <main class="error-page">
        <div class="container">
            <div class="error-code">404</div>
            <h1>Page Not Found</h1>
            <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
            <div class="error-actions">
                <a href="/" class="btn btn-primary"><i class="fas fa-home" aria-hidden="true"></i> Back to Home</a>
                <a href="/#contact" class="btn btn-outline">Contact Me</a>
            </div>
        </div>
    </main>
</body>
</html>
